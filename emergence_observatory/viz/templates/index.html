<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Emergence Observatory — LLM Laboratory</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; padding: 16px; }
  h1 { font-size: 1.2rem; margin-bottom: 8px; color: #58a6ff; }

  #layout { display: flex; gap: 16px; flex-wrap: wrap; }

  #left-col { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 500px; }
  #right-col { width: 340px; display: flex; flex-direction: column; gap: 8px; }

  #canvas-wrap { border: 1px solid #30363d; border-radius: 6px; overflow: hidden; background: #161b22; }
  canvas { display: block; width: 100%; height: auto; aspect-ratio: 4/3; }

  .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 10px; }
  .card h2 { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
  .value-lg { font-size: 1.4rem; font-weight: 600; color: #f0f6fc; }
  .metric-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .metric-row .card { flex: 1; min-width: 70px; }

  #conversations { max-height: 300px; overflow-y: auto; font-size: 0.8rem; }
  #conversations .msg { padding: 4px 6px; margin: 2px 0; border-left: 3px solid #58a6ff; background: #0d1117; border-radius: 0 4px 4px 0; }
  #conversations .msg .from { color: #58a6ff; font-weight: 600; }
  #conversations .msg .content { color: #f0f6fc; }

  #word-ticker { font-size: 0.8rem; max-height: 120px; overflow-y: auto; }
  #word-ticker .word { display: inline-block; background: #21262d; padding: 2px 8px; border-radius: 10px; margin: 2px; font-size: 0.75rem; }

  #status { font-size: 0.75rem; color: #8b949e; margin-top: 4px; }
  .label-sm { font-size: 0.7rem; color: #8b949e; }
</style>
</head>
<body>
<h1>🔬 Emergence Observatory — LLM Agent Laboratory</h1>

<div id="layout">
  <div id="left-col">
    <div id="canvas-wrap">
      <canvas id="grid" width="800" height="600"></canvas>
    </div>
    <div class="metric-row">
      <div class="card"><h2>Tick</h2><div class="value-lg" id="tick">0</div></div>
      <div class="card"><h2>Agents</h2><div class="value-lg" id="numAgents">0</div></div>
      <div class="card"><h2>Avg Energy</h2><div class="value-lg" id="avgEnergy">0</div></div>
      <div class="card"><h2>Vocabulary</h2><div class="value-lg" id="vocabSize">0</div></div>
    </div>
    <div class="metric-row">
      <div class="card"><h2>Entropy</h2><div class="value-lg" id="entropy">0</div></div>
      <div class="card"><h2>Graph Density</h2><div class="value-lg" id="graphDensity">0</div></div>
      <div class="card"><h2>Communities</h2><div class="value-lg" id="numCommunities">0</div></div>
      <div class="card"><h2>Alliances</h2><div class="value-lg" id="numAlliances">0</div></div>
    </div>
    <div class="metric-row">
      <div class="card"><h2>Word Survival</h2><div class="value-lg" id="wordSurvival">0</div></div>
      <div class="card"><h2>Alliance Survival</h2><div class="value-lg" id="allianceSurvival">0</div></div>
    </div>
  </div>

  <div id="right-col">
    <div class="card">
      <h2>💬 Live Conversations</h2>
      <div id="conversations">Awaiting first interactions...</div>
    </div>
    <div class="card">
      <h2>✨ Invented Words</h2>
      <div id="word-ticker">None yet.</div>
    </div>
  </div>
</div>

<div id="status">Connecting...</div>
<script src="/static/viz.js"></script>
</body>
</html>
